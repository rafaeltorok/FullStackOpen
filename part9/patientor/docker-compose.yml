services:
  server:
    build:
      context: ./
      dockerfile: ./server/Dockerfile
    container_name: patientor-server
    networks:
      - network
    ports:
      - "3001:3001"

  client:
    build:
      context: ./
      dockerfile: ./client/Dockerfile
    container_name: patientor-client
    networks:
      - network
    ports:
      - "5173:80"
    depends_on:
      - server

networks:
  network:
    driver: bridge