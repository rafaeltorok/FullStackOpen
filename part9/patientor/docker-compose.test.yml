services:
  server:
    build:
      context: .
      dockerfile: ./server/Dockerfile
    container_name: patientor-server
    environment:
      - NODE_ENV=test
    ports:
      - "3001:3001"
    networks:
      - network
    healthcheck:
      # Alpine does not support curl, use wget instead
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  client:
    build:
      context: .
      dockerfile: ./client/Dockerfile
    container_name: patientor-client
    ports:
      - "5173:80"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 5s
      timeout: 5s
      retries: 5

  e2e:
    build:
      context: .
      dockerfile: ./e2e/Dockerfile
    container_name: patientor-e2e
    depends_on:
      client:
        condition: service_healthy
      server:
        condition: service_healthy
    networks:
      - network
    environment:
      - BASE_URL=http://patientor-client:80
    volumes:
      - ./e2e/test-results:/e2e/test-results
      - ./e2e/playwright-report:/e2e/playwright-report

networks:
  network:
    driver: bridge
